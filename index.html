/* ===================== 全局持久化账本（硬骨头核心） ===================== */
let globalErrorLog = JSON.parse(localStorage.getItem("catti_global_errors") || "{}");

function logWordError(en) {
  globalErrorLog[en] = (globalErrorLog[en] || 0) + 1;
  localStorage.setItem("catti_global_errors", JSON.stringify(globalErrorLog));
}
function clearWordError(en) {
  if (globalErrorLog[en]) {
    delete globalErrorLog[en];
    localStorage.setItem("catti_global_errors", JSON.stringify(globalErrorLog));
  }
}

function getHardcorePool() {
  let pool = [];
  let seenEn = new Set();
  for (let day in wordBanks) {
    wordBanks[day].forEach(item => {
      if (globalErrorLog[item.en] >= 2 && !seenEn.has(item.en)) {
        pool.push(item);
        seenEn.add(item.en);
      }
    });
  }
  return pool;
}

/* ===================== 系统状态控制 ===================== */
let currentBank = Number(localStorage.getItem("catti_bank") || 1);
let isHardcoreMode = false; 

let terms = []; 
let wrongSet = new Set();
let wrongCount = {}; 
let seenSet = new Set();
let skippedSet = new Set(); 
let currentIndex = -1;
let total = 0;
let correct = 0;
let wrongMode = false;

let hardcoreTotalCount = 0; 
let hardcoreMasteredSet = new Set(); 
let hardcoreWrongCount = {}; 
let hardcoreWrongSet = new Set();

const bankSelect = document.getElementById("bankSelect");
const chineseEl = document.getElementById("chineseTerm");
const inputEl = document.getElementById("answerInput");
const feedbackEl = document.getElementById("feedback");
const statsEl = document.getElementById("stats");
const progressEl = document.getElementById("progressText");
const wrongModeBtn = document.getElementById("wrongModeBtn");
const notepad = document.getElementById("notepad");
const noteCount = document.getElementById("noteCount");
const quizSection = document.getElementById("quizSection");
const nextDayContainer = document.getElementById("nextDayContainer");
const dayLabel = document.getElementById("dayLabel");

function normalize(str) { return str.trim().toLowerCase().replace(/\s+/g, " "); }
function speakText(text, lang = "en-US") {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang; utter.rate = 1.0;
  speechSynthesis.cancel(); speechSynthesis.speak(utter);
}

function updateNoteCount() { noteCount.textContent = `${notepad.value.length} / 500`; }
function loadWordNote() {
  if (currentIndex !== -1 && terms[currentIndex]) {
    const wordKey = `note_${terms[currentIndex].en}`;
    notepad.value = localStorage.getItem(wordKey) || "";
    notepad.placeholder = `记录笔记 【${terms[currentIndex].zh}】...`;
  } else {
    notepad.value = ""; notepad.placeholder = "记录想法...";
  }
  updateNoteCount();
}

/* ===================== 环境切回常规主线 ===================== */
function changeBank(bankId) {
  isHardcoreMode = false;
  currentBank = bankId;
  bankSelect.value = String(currentBank);
  localStorage.setItem("catti_bank", String(currentBank));

  document.getElementById("setupMetaArea").style.display = "block";
  dayLabel.textContent = `Day ${currentBank}`;
  dayLabel.style.color = "#2563eb";

  terms = wordBanks[currentBank];
  wrongSet = new Set(); wrongCount = {}; seenSet = new Set(); skippedSet = new Set();
  currentIndex = -1; total = 0; correct = 0; wrongMode = false;
  wrongModeBtn.textContent = "错题本模式：关闭";

  localStorage.removeItem(`catti_progress_${currentBank}`);
  nextDayContainer.innerHTML = "";
  quizSection.style.display = "block";

  pickRandom();
  updateStats();
  saveProgress();
}

/* ===================== 环境切入硬骨头特训 ===================== */
function startHardcoreMode() {
  let fullPool = getHardcorePool();
  if (fullPool.length === 0) return;

  isHardcoreMode = true;
  document.getElementById("setupMetaArea").style.display = "block";
  dayLabel.textContent = "🔥 啃硬骨头特训中";
  dayLabel.style.color = "#ea580c";

  fullPool.sort(() => Math.random() - 0.5);
  terms = fullPool.slice(0, 10);

  hardcoreWrongSet = new Set();
  hardcoreWrongCount = {};
  hardcoreMasteredSet = new Set();
  hardcoreTotalCount = terms.length;
  
  currentIndex = -1;
  quizSection.style.display = "block";
  nextDayContainer.innerHTML = "";

  pickRandom();
  updateStats();
}

/* ===================== 核心出题算法 ===================== */
function pickRandom() {
  if (localStorage.getItem("catti_sys_activated") !== "true") return; 

  if (isHardcoreMode) {
    if (hardcoreMasteredSet.size >= hardcoreTotalCount && hardcoreTotalCount > 0) {
      showNextDayOption();
      return;
    }
  } else {
    let activeWrongs = Array.from(wrongSet).filter(i => !skippedSet.has(i));
    if (seenSet.size >= terms.length && activeWrongs.length === 0) {
      showNextDayOption();
      return;
    }
  }

  let poolIds = [];
  
  if (isHardcoreMode) {
    let activeHardcoreWrongs = Array.from(hardcoreWrongSet);
    if (activeHardcoreWrongs.length > 0) {
      poolIds = activeHardcoreWrongs;
    } else {
      poolIds = terms.map((_, i) => i).filter(i => !hardcoreMasteredSet.has(i));
    }
  } else {
    let activeWrongs = Array.from(wrongSet).filter(i => !skippedSet.has(i));
    if (wrongMode) {
      poolIds = activeWrongs;
    } else if (activeWrongs.length > 0) {
      poolIds = activeWrongs;
    } else {
      poolIds = terms.map((_, i) => i).filter(i => !seenSet.has(i) && !skippedSet.has(i));
    }
  }

  if (poolIds.length === 0) {
    showNextDayOption();
    return;
  }

  quizSection.style.display = "block";
  nextDayContainer.innerHTML = "";

  const randIdx = Math.floor(Math.random() * poolIds.length);
  currentIndex = poolIds[randIdx];

  const currentWord = terms[currentIndex];
  if (currentWord.hint) {
    chineseEl.innerHTML = `${currentWord.zh}<span class="hint">⚠️ ${currentWord.hint}</span>`;
  } else {
    chineseEl.textContent = currentWord.zh;
  }

  inputEl.value = "";
  inputEl.focus();
  feedbackEl.textContent = "";

  if (!isHardcoreMode) seenSet.add(currentIndex);
  loadWordNote();
  updateProgress();
}

function updateStats() {
  const rate = total === 0 ? 0 : ((correct / total) * 100).toFixed(1);
  let activePoolSize = isHardcoreMode ? hardcoreWrongSet.size : wrongSet.size;
  statsEl.textContent = `答题数：${total}，答对：${correct}，正确率：${rate}%，本轮死磕池：${activePoolSize}`;
  updateProgress();
}

function updateProgress() {
  if (isHardcoreMode) {
    const percent = ((hardcoreMasteredSet.size / hardcoreTotalCount) * 100).toFixed(1);
    progressEl.textContent = `${hardcoreMasteredSet.size} / ${hardcoreTotalCount}（${percent}%）[硬骨头特训]`;
  } else {
    const totalWords = terms.length;
    const masteredCount = terms.map((_, i) => i).filter(i => seenSet.has(i) && !wrongSet.has(i) && !skippedSet.has(i)).length;
    const activeTotal = totalWords - skippedSet.size;
    const displayTotal = activeTotal > 0 ? activeTotal : totalWords;
    const percent = ((masteredCount / displayTotal) * 100).toFixed(1);
    progressEl.textContent = `${masteredCount} / ${displayTotal}（${percent}%）`;
  }
}

/* ===================== 核心输入判定 ===================== */
function submitAnswer() {
  if (currentIndex === -1) return;
  const user = normalize(inputEl.value);
  const target = normalize(terms[currentIndex].en);
  if (!user) return;

  total += 1;
  speakText(terms[currentIndex].en, "en-US");

  if (user === target) {
    correct += 1;

    if (isHardcoreMode) {
      if (hardcoreWrongSet.has(currentIndex)) {
        hardcoreWrongCount[currentIndex] = (hardcoreWrongCount[currentIndex] || 0) + 1;
        if (hardcoreWrongCount[currentIndex] >= 2) {
          hardcoreWrongSet.delete(currentIndex);
          hardcoreMasteredSet.add(currentIndex);
          clearWordError(terms[currentIndex].en); 
        }
      } else {
        hardcoreWrongSet.add(currentIndex);
        hardcoreWrongCount[currentIndex] = 1;
      }
    } else {
      if (wrongSet.has(currentIndex)) {
        wrongCount[currentIndex] = (wrongCount[currentIndex] || 0) + 1;
        if (wrongCount[currentIndex] >= 2) {
          wrongSet.delete(currentIndex);
          delete wrongCount[currentIndex];
        }
      }
    }

    feedbackEl.textContent = "✅ 正确！";
    feedbackEl.className = "feedback correct";
    updateStats();
    saveProgress();
    setTimeout(pickRandom, 1000); 
    return;
  }

  feedbackEl.innerHTML = `❌ 拼写错误！<br>标准答案：<span class="answer">${terms[currentIndex].en}</span><br>请重新抄写一次。`;
  feedbackEl.className = "feedback wrong";

  if (isHardcoreMode) {
    hardcoreWrongSet.add(currentIndex);
    hardcoreWrongCount[currentIndex] = 0; 
  } else {
    wrongSet.add(currentIndex);
    wrongCount[currentIndex] = 0; 
    logWordError(terms[currentIndex].en); 
  }

  updateStats();
  saveProgress();
}

function skipCurrentWord() {
  if (currentIndex === -1 || isHardcoreMode) return; 
  skippedSet.add(currentIndex);
  wrongSet.delete(currentIndex);
  delete wrongCount[currentIndex];
  feedbackEl.textContent = `🚫 已将【${terms[currentIndex].zh}】移出今日词表`;
  feedbackEl.className = "feedback wrong";
  updateStats(); saveProgress();
  setTimeout(pickRandom, 500);
}

/* ===================== 通关结算台 ===================== */
function showNextDayOption() {
  currentIndex = -1;
  loadWordNote();
  updateProgress();

  if (isHardcoreMode) {
    chineseEl.textContent = "🏆 战栗吧生词！这一组高频硬骨头已被你完全嚼碎！";
  } else {
    chineseEl.textContent = "🎉 太棒了！当前 Day 的所有单词已全数消灭！";
  }
  
  quizSection.style.display = "none";
  nextDayContainer.innerHTML = ""; 

  if (!isHardcoreMode) {
    const nextBankId = currentBank + 1;
    const playBtn = document.createElement("button");
    playBtn.className = "success";
    if (wordBanks[nextBankId] !== undefined) {
      playBtn.textContent = `已背完，点我进入超前点播 Day ${nextBankId} ➔`;
      playBtn.onclick = () => changeBank(nextBankId);
    } else {
      playBtn.textContent = `🏆 10天总通关！点我重头复习 Day 1 ↺`;
      playBtn.onclick = () => changeBank(1);
    }
    nextDayContainer.appendChild(playBtn);
  } else {
    const backBtn = document.createElement("button");
    backBtn.className = "success";
    backBtn.textContent = "🔙 骨头啃完了，返回我的日常主线";
    backBtn.onclick = () => changeBank(currentBank);
    nextDayContainer.appendChild(backBtn);
  }

  let bonePool = getHardcorePool();
  if (bonePool.length > 0) {
    const boneBtn = document.createElement("button");
    boneBtn.className = "hardcore";
    boneBtn.textContent = `🔥 去啃硬骨头！专杀历史高频错词（当前余 ${bonePool.length} 个）`;
    boneBtn.onclick = startHardcoreMode;
    nextDayContainer.appendChild(boneBtn);
  }

  const expBtn = document.createElement("button");
  expBtn.className = "info";
  expBtn.textContent = "📊 导出我刚刚背的这套单词及笔记";
  expBtn.onclick = exportTable;
  nextDayContainer.appendChild(expBtn);

  const wechatBox = document.createElement("div");
  wechatBox.className = "wechat-box";
  wechatBox.innerHTML = `💡 有问题或者加新词？微信：<strong>majiayooo</strong>`;
  nextDayContainer.appendChild(wechatBox);
}

function exportTable() {
  let tableHtml = `<h2>学习结果表</h2><table border="1" cellspacing="0" cellpadding="6" style="border-collapse:collapse;width:100%;font-size:14px;"><tr><th>中文</th><th>英文</th><th>历史错误</th></tr>`;
  terms.forEach((item) => {
    let errTimes = globalErrorLog[item.en] || 0;
    tableHtml += `<tr><td>${item.zh} [${item.hint || '无'}]</td><td>${item.en}</td><td>${errTimes} 次</td></tr>`;
  });
  tableHtml += `</table>`;
  const win = window.open("", "_blank"); win.document.write(tableHtml); win.document.close();
}

/* ===================== 全局生命周期控制流映射 ===================== */
function initializeQuizSystem() {
  terms = wordBanks[currentBank];
  if (!loadProgress()) {
    pickRandom(); 
    updateStats();
  } else {
    let activeWrongs = Array.from(wrongSet).filter(i => !skippedSet.has(i));
    if (seenSet.size >= terms.length && activeWrongs.length === 0) {
      showNextDayOption(); 
      updateStats();
    } else {
      if (currentIndex === -1 || !terms[currentIndex] || skippedSet.has(currentIndex)) {
        pickRandom(); 
        updateStats();
      } else {
        const currentWord = terms[currentIndex];
        if (currentWord.hint) {
          chineseEl.innerHTML = `${currentWord.zh}<span class="hint">⚠️ ${currentWord.hint}</span>`;
        } else {
          chineseEl.textContent = currentWord.zh;
        }
        loadWordNote(); 
        updateStats();
      }
    }
  }
}

/* ===================== 事件绑定 ===================== */
bankSelect.value = String(currentBank);
bankSelect.addEventListener("change", () => changeBank(Number(bankSelect.value)));
wrongModeBtn.addEventListener("click", () => {
  wrongMode = !wrongMode; wrongModeBtn.textContent = wrongMode ? "错题本模式：开启" : "错题本模式：关闭";
  pickRandom(); updateStats(); saveProgress();
});

document.getElementById("submitBtn").addEventListener("click", submitAnswer);
document.getElementById("nextBtn").addEventListener("click", () => { pickRandom(); saveProgress(); });
document.getElementById("idkBtn").addEventListener("click", () => {
  if (currentIndex === -1) return;
  speakText(terms[currentIndex].en, "en-US");
  feedbackEl.innerHTML = `❌ 我不知道。<br>答案：<span class="answer">${terms[currentIndex].en}</span><br>请重新输入。`;
  feedbackEl.className = "feedback wrong";
  
  if (isHardcoreMode) {
    hardcoreWrongSet.add(currentIndex); hardcoreWrongCount[currentIndex] = 0;
  } else {
    wrongSet.add(currentIndex); wrongCount[currentIndex] = 0;
    logWordError(terms[currentIndex].en);
  }
  updateStats(); saveProgress();
});
document.getElementById("speakBtn").addEventListener("click", () => { if (currentIndex !== -1) speakText(terms[currentIndex].en, "en-US"); });
document.getElementById("skipBtn").addEventListener("click", skipCurrentWord);
document.getElementById("exportBtn").addEventListener("click", exportTable);

document.getElementById("themeToggle").addEventListener("click", () => {
  document.body.classList.toggle("dark");
  document.getElementById("themeToggle").textContent = document.body.classList.contains("dark") ? "白天模式" : "夜间模式";
});

document.addEventListener("keydown", e => {
  if (document.activeElement === notepad) return;
  if (e.key === "Enter" && document.activeElement === inputEl) submitAnswer();
  if (e.key === "/" && document.activeElement === inputEl && inputEl.value.trim() === "") { e.preventDefault(); document.getElementById("idkBtn").click(); }
  if (e.key === "." && document.activeElement === inputEl && inputEl.value.trim() === "") { e.preventDefault(); document.getElementById("speakBtn").click(); }
  if (e.shiftKey && (e.key === "S" || e.key === "s")) { e.preventDefault(); skipCurrentWord(); }
});

function saveProgress() {
  if(isHardcoreMode) return; 
  const data = { currentIndex, wrongSet: Array.from(wrongSet), wrongCount, total, correct, seenSet: Array.from(seenSet), skippedSet: Array.from(skippedSet), wrongMode };
  localStorage.setItem(`catti_progress_${currentBank}`, JSON.stringify(data));
}

function loadProgress() {
  const raw = localStorage.getItem(`catti_progress_${currentBank}`);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    currentIndex = data.currentIndex ?? -1;
    wrongSet = new Set(data.wrongSet ?? []);
    wrongCount = data.wrongCount ?? {};
    total = data.total ?? 0; correct = data.correct ?? 0;
    seenSet = new Set(data.seenSet ?? []); skippedSet = new Set(data.skippedSet ?? []);
    wrongMode = data.wrongMode ?? false;
    wrongModeBtn.textContent = wrongMode ? "错题本模式：开启" : "错题本模式：关闭";
    return true;
  } catch (e) { return false; }
}

notepad.addEventListener("input", () => {
  if (notepad.value.length > 500) notepad.value = notepad.value.slice(0, 500);
  updateNoteCount();
  if (currentIndex !== -1 && terms[currentIndex]) localStorage.setItem(`note_${terms[currentIndex].en}`, notepad.value);
});

// 首次生命周期钩子启动
if (hasAuth) {
  initializeQuizSystem();
}

/* ===================== 📱 跨设备进度同步 ===================== */
function gatherAllData() {
  const snapshot = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    snapshot[key] = localStorage.getItem(key);
  }
  return snapshot;
}

function generateSyncCode() {
  const feedbackEl = document.getElementById("syncFeedback");
  try {
    const data = gatherAllData();
    const json = JSON.stringify(data);
    const encoded = btoa(unescape(encodeURIComponent(json)));
    const output = document.getElementById("syncOutput");
    output.value = encoded;
    output.style.display = "block";
    navigator.clipboard.writeText(encoded).then(() => {
      feedbackEl.style.color = "#16a34a";
      feedbackEl.textContent = "✅ 口令已生成并自动复制！在其他设备粘贴导入即可。";
    }).catch(() => {
      feedbackEl.style.color = "#2563eb";
      feedbackEl.textContent = "✅ 口令已生成！请手动全选复制上方文本框内容。";
    });
  } catch(e) {
    feedbackEl.style.color = "#dc2626";
    feedbackEl.textContent = "❌ 生成失败：" + e.message;
  }
}

function importSyncCode() {
  const feedbackEl = document.getElementById("syncFeedback");
  const input = document.getElementById("syncInput").value.trim();
  if (!input) {
    feedbackEl.style.color = "#dc2626";
    feedbackEl.textContent = "❌ 请先粘贴同步口令！";
    return;
  }
  try {
    const json = decodeURIComponent(escape(atob(input)));
    const data = JSON.parse(json);
    // Validate it looks like our data
    if (!data["catti_sys_activated"]) {
      feedbackEl.style.color = "#dc2626";
      feedbackEl.textContent = "❌ 口令无效或已损坏，请重新生成。";
      return;
    }
    // Confirm before overwriting
    if (!confirm("⚠️ 导入将覆盖本设备上的所有进度数据，确认继续？")) return;
    localStorage.clear();
    for (const [key, value] of Object.entries(data)) {
      localStorage.setItem(key, value);
    }
    feedbackEl.style.color = "#16a34a";
    feedbackEl.textContent = "✅ 进度同步成功！正在重新加载...";
    setTimeout(() => location.reload(), 1000);
  } catch(e) {
    feedbackEl.style.color = "#dc2626";
    feedbackEl.textContent = "❌ 解析失败，口令可能不完整：" + e.message;
  }
}
</script>

<div class="card" style="margin-top:20px;">
  <h3 style="margin-top:0;">📱 跨设备进度同步</h3>
  <p style="font-size:14px; color:#555; margin-bottom:14px;">
    换设备时使用。电脑上生成口令 → 复制 → 手机上粘贴导入，即可完整还原所有进度、错题和笔记。
  </p>

  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button class="primary" onclick="generateSyncCode()" style="flex:1; min-width:140px;">📤 生成同步口令</button>
    <button class="secondary" onclick="document.getElementById('importArea').style.display='block'" style="flex:1; min-width:140px;">📥 导入同步口令</button>
  </div>

  <textarea id="syncOutput" placeholder="口令将显示在这里..." style="display:none; margin-top:12px; height:100px; font-size:12px; font-family:monospace; word-break:break-all;"></textarea>

  <div id="importArea" style="display:none; margin-top:12px;">
    <textarea id="syncInput" placeholder="请将口令粘贴到这里..." style="height:100px; font-size:12px; font-family:monospace; word-break:break-all;"></textarea>
    <button class="success" onclick="importSyncCode()" style="margin-top:8px;">✅ 确认导入并同步</button>
  </div>

  <div id="syncFeedback" style="margin-top:10px; font-size:14px; min-height:20px; font-weight:bold;"></div>
</div>
