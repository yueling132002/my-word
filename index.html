<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATTI 词汇备考系统(进度记忆版)</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --bg-color: #f5f7fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: var(--primary-color);
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
        }
        #word-system {
            display: none;
        }
        .progress-bar {
            background: #eee;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress {
            background: var(--success-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .word-card {
            background: #fdfdfd;
            border: 2px solid #edf2f7;
            border-radius: 8px;
            padding: 40px 20px;
            margin: 20px 0;
            cursor: pointer;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .word-cn {
            font-size: 22px;
            font-weight: bold;
            color: #2d3748;
        }
        .word-en {
            font-size: 20px;
            color: var(--primary-color);
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }
        .tip {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 15px;
        }
        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-nav {
            flex: 1;
            background-color: #edf2f7;
            color: #4a5568;
        }
        .btn-nav:hover {
            background-color: #e2e8f0;
        }
        .reset-link {
            display: block;
            margin-top: 25px;
            font-size: 12px;
            color: #a0aec0;
            text-decoration: none;
            cursor: pointer;
        }
        .reset-link:hover {
            color: #e53e3e;
        }
    </style>
</head>
<body>

<div class="container" id="login-box">
    <h2>🔒 CATTI 学习系统已加密</h2>
    <p style="color: #718096;">请输入解锁密码进入背单词系统</p>
    <input type="password" id="password" placeholder="请输入密码" onkeydown="if(event.keyCode==13) verifyPassword()">
    <br>
    <button onclick="verifyPassword()">解锁系统</button>
</div>

<div class="container" id="word-system">
    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #718096; margin-bottom: 5px;">
        <span>CATTI 热词大练兵</span>
        <span id="progress-text">0 / 0</span>
    </div>
    <div class="progress-bar">
        <div class="progress" id="progress-juice"></div>
    </div>

    <div class="word-card" onclick="toggleAnswer()">
        <div class="word-cn" id="display-cn"></div>
        <div class="word-en" id="display-en"></div>
        <div class="tip" id="card-tip">💡 点击卡片反面查看英文翻译</div>
    </div>

    <div class="btn-group">
        <button class="btn-nav" onclick="prevWord()">⬅️ 上一个</button>
        <button class="btn-nav" style="background-color: #e6fffa; color: #234e52;" onclick="toggleAnswer()">👁️ 翻面</button>
        <button class="btn-nav" onclick="nextWord()">下一个 ➡️</button>
    </div>

    <span class="reset-link" onclick="resetProgress()">🔄 重置背词进度回到第一个</span>
</div>

<script>
    // 密码设置
    const CORRECT_PASSWORD = "CATTI_PASS_666"; 

    // 词库源（你可以随时按此格式在数组里追加新词）
    const WORD_LIST = [
        { cn: "新质生产力", en: "new quality productive forces" },
        { cn: "高质量发展", en: "high-quality development" },
        { cn: "中国式现代化", en: "Chinese modernization" },
        { cn: "新型消费", en: "new types of consumption" },
        { cn: "expand domestic demand", en: "expand domestic demand" },
        { cn: "人工智能+", en: "AI Plus initiative" },
        { cn: "绿色低碳转型", en: "green and low-carbon transition" }
    ];

    let currentIndex = 0;
    let isShowingAnswer = false;

    // 密码验证函数
    function verifyPassword() {
        const inputPassword = document.getElementById('password').value.trim();
        
        if (inputPassword === CORRECT_PASSWORD) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('word-system').style.display = 'block';
            initSystem();
        } else {
            alert("❌ 密码错误，请重新输入！");
            document.getElementById('password').value = "";
            document.getElementById('password').focus();
        }
    }

    // 初始化背单词界面并读取进度
    function initSystem() {
        // 从本地缓存加载之前的进度，如果没有则默认为 0
        const savedIndex = localStorage.getItem('catti_word_progress');
        if (savedIndex !== null && savedIndex < WORD_LIST.length) {
            currentIndex = parseInt(savedIndex, 10);
        } else {
            currentIndex = 0;
        }
        updateCard();
    }

    // 更新卡片内容并保存进度
    function updateCard() {
        if (WORD_LIST.length === 0) return;
        
        const currentWord = WORD_LIST[currentIndex];
        document.getElementById('display-cn').innerText = currentWord.cn;
        document.getElementById('display-en').innerText = currentWord.en;
        
        isShowingAnswer = false;
        document.getElementById('display-en').style.display = 'none';
        document.getElementById('card-tip').innerText = "💡 点击卡片查看英文翻译";

        // 更新进度条 UI
        const total = WORD_LIST.length;
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${total}`;
        const progressPercent = ((currentIndex + 1) / total) * 100;
        document.getElementById('progress-juice').style.width = `${progressPercent}%`;

        // 【关键改动】实时保存当前索引到用户浏览器的本地缓存
        localStorage.setItem('catti_word_progress', currentIndex);
    }

    // 翻转卡片
    function toggleAnswer() {
        isShowingAnswer = !isShowingAnswer;
        const enDiv = document.getElementById('display-en');
        const tipDiv = document.getElementById('card-tip');
        
        if (isShowingAnswer) {
            enDiv.style.display = 'block';
            tipDiv.innerText = "💡 再次点击可隐藏英文";
        } else {
            enDiv.style.display = 'none';
            tipDiv.innerText = "💡 点击卡片查看英文翻译";
        }
    }

    // 下一个
    function nextWord() {
        if (currentIndex < WORD_LIST.length - 1) {
            currentIndex++;
            updateCard();
        } else {
            alert("🎉 太棒了！这组词汇你已经全部过了一遍了！");
        }
    }

    // 上一个
    function prevWord() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    // 【新增功能】允许用户手动重置进度回到第一个词
    function resetProgress() {
        if (confirm("确定要重置背词进度，回到第一个单词吗？")) {
            currentIndex = 0;
            updateCard();
        }
    }
</script>

</body>
</html>
